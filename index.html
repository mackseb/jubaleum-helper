<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Helfer-Ablaufplan · J & S</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --ink: #2d2a26;
    --muted: #8c857c;
    --line: #ece7df;
    --accent: #b08968;
    --accent-deep: #8a6443;
    --accent-soft: #f4ece3;
    --done: #b9b2a7;
    --now: #b08968;
    --shadow: 0 1px 2px rgba(45,42,38,.04), 0 6px 22px rgba(45,42,38,.06);
    --radius: 16px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 70px;
  }

  .serif { font-family: "Georgia", "Times New Roman", serif; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 18px; }

  /* ---------- Header ---------- */
  header { text-align: center; padding: 40px 18px 18px; }
  .monogram {
    font-family: "Georgia", serif;
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
  }
  .monogram::before, .monogram::after {
    content: ""; display: inline-block; width: 26px; height: 1px;
    background: var(--accent); vertical-align: middle; margin: 0 12px; opacity: .5;
  }
  h1 { font-family: "Georgia", serif; font-weight: 400; font-size: 30px; margin: 0 0 6px; }
  .subtitle { color: var(--muted); font-size: 15px; margin: 0; }
  .theme {
    margin: 12px 0 0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent-deep);
  }
  .theme::before { content: "✶ "; opacity: .6; }
  .theme::after { content: " ✶"; opacity: .6; }

  /* ---------- Live banner ---------- */
  .live {
    background: linear-gradient(135deg, #fff 0%, var(--accent-soft) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin: 18px 0 6px;
  }
  .live .head {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent-deep); font-weight: 700; margin-bottom: 10px;
  }
  .pulse {
    width: 9px; height: 9px; border-radius: 50%; background: var(--now);
    box-shadow: 0 0 0 0 rgba(176,137,104,.55);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(176,137,104,.5); }
    70% { box-shadow: 0 0 0 9px rgba(176,137,104,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,137,104,0); }
  }
  .live .countdown { font-family:"Georgia",serif; font-size: 19px; margin: 0 0 12px; }
  .live .nowrow, .live .nextrow { display:flex; gap:10px; font-size:14px; margin-top:6px; }
  .live .lbl { flex:0 0 86px; color: var(--muted); }
  .live .val { font-weight: 600; }
  .live .val .t { color: var(--accent-deep); font-variant-numeric: tabular-nums; }

  /* ---------- Filter bar ---------- */
  .filterbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,248,245,.93);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 0 12px; margin: 14px 0 2px;
  }
  .filter-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; font-weight: 600;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    border: 1px solid var(--line); background: var(--card);
    color: var(--ink); font-size: 14px; font-family: inherit;
    padding: 7px 13px; border-radius: 999px; cursor: pointer;
    transition: all .15s ease; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.active .dot { box-shadow: 0 0 0 1.5px #fff; }
  .chip.group { font-weight: 600; }
  .chip .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }
  .group-row { margin-bottom: 12px; }

  .toolbar { display:flex; align-items:center; justify-content:space-between; margin: 14px 2px 2px; gap: 10px; flex-wrap: wrap;}
  .count { color: var(--muted); font-size: 13px; }
  .toggle { display:inline-flex; align-items:center; gap:8px; font-size:13px; color: var(--muted); cursor:pointer; user-select:none;}
  .toggle input { display:none; }
  .switch { width: 36px; height: 20px; border-radius: 999px; background: var(--line); position: relative; transition: background .15s; flex: 0 0 auto;}
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.2); transition: left .15s;}
  .toggle input:checked + .switch { background: var(--accent); }
  .toggle input:checked + .switch::after { left: 18px; }

  /* ---------- Sections & timeline ---------- */
  .section-head { margin: 26px 0 4px; display:flex; align-items:baseline; gap:10px; }
  .section-head h2 { font-family:"Georgia",serif; font-weight:400; font-size:20px; margin:0; }
  .section-head .sub { font-size: 13px; color: var(--muted); }
  .section-head.today h2::after {
    content: "heute"; font-family: inherit; font-size:11px; letter-spacing:1px; text-transform:uppercase;
    background: var(--accent); color:#fff; padding:2px 8px; border-radius:999px; margin-left:10px; vertical-align: middle;
  }

  .item { display: flex; align-items: stretch; }
  .item .time {
    flex: 0 0 46px; text-align: right; font-variant-numeric: tabular-nums;
    font-weight: 600; font-size: 14px; padding-top: 15px; color: var(--ink);
  }
  .item .dotcol { flex: 0 0 26px; position: relative; display:flex; justify-content:center; }
  .item .dotcol::before { content:""; position:absolute; top:0; bottom:0; width:2px; background: var(--line); }
  .item:first-child .dotcol::before { top: 16px; }
  .item:last-child .dotcol::before { bottom: calc(100% - 16px); }
  .dot2 {
    position: relative; margin-top: 15px; width: 11px; height: 11px; border-radius: 50%;
    background: #d8d1c6; border: 2px solid var(--bg); z-index: 1; flex: 0 0 auto;
  }
  .item .body { flex: 1 1 auto; min-width: 0; padding: 12px 0 12px 6px; border-bottom: 1px solid var(--line); }
  .item:last-child .body { border-bottom: none; }
  .item .body h3 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
  .item .details { color: #56514a; font-size: 13.5px; margin: 0 0 9px; white-space: pre-line; }
  .who { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 12px; padding: 3px 9px; border-radius: 999px;
    background: var(--accent-soft); color: #7a5c41; display: inline-flex; align-items: center;
  }
  .tag .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
  .tag.neutral { background: #f0eee9; color: var(--muted); }
  .tag.open { background: transparent; color: var(--muted); border: 1px dashed #cfc7ba; }

  /* status */
  .item.done .body { opacity: .55; }
  .item.done h3 { text-decoration: line-through; text-decoration-color: rgba(45,42,38,.25); }
  .item.done .dot2 { background: var(--done); border-color: var(--bg); }
  .item.done .time { color: var(--muted); }

  .item.current .body {
    background: var(--accent-soft); border-bottom-color: transparent;
    border-radius: 12px; padding: 12px 14px; margin: 2px 0 2px;
    box-shadow: var(--shadow);
  }
  .item.current .dot2 {
    background: var(--now); border-color: var(--bg); width: 13px; height: 13px;
    box-shadow: 0 0 0 0 rgba(176,137,104,.55); animation: pulse 2s infinite;
  }
  .item.current h3::after {
    content: "JETZT"; font-size: 10px; letter-spacing: 1px; font-weight: 700;
    background: var(--now); color:#fff; padding: 2px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle;
  }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 34px 18px 0; line-height: 1.7; }
  footer .orn { color: var(--accent); opacity:.6; font-size:16px; margin-bottom: 8px; }

  @media (max-width: 480px) {
    h1 { font-size: 25px; }
    .item .time { flex-basis: 42px; font-size: 13px; }
    .item .dotcol { flex-basis: 22px; }
  }
</style>
</head>

function atTime(base, h, m){ const d = new Date(base); d.setHours(h, m, 0, 0); return d; }

// Tag + Tageskennung ableiten, Zeitstempel berechnen
SCHEDULE.forEach(it => { it.day = SEC2DAY[it.sec]; it.allday = ALLDAY.has(it.sec); });

(function buildTimestamps(){
  let prev = null;
  SCHEDULE.forEach(it => {
    if (it.allday) { it.ts = null; return; }
    if (it.time) {
      const [h,m] = it.time.split(":").map(Number);
      let ts = atTime(DAYS[it.day], h, m);
      if (prev && h < 6 && prev.getHours() >= 12) ts = new Date(ts.getTime() + 86400000);
      it.ts = ts; prev = ts;
    } else { it.ts = null; }
  });
  // Untimed (nicht-ganztägige) Punkte zwischen Ankern verteilen
  const seq = SCHEDULE.filter(x => !x.allday);
  let pend = [], prevA = null;
  seq.forEach(it => {
    if (it.ts) {
      if (pend.length) {
        if (prevA) {
          const span = it.ts - prevA.ts;
          pend.forEach((p,k) => p.ts = new Date(prevA.ts.getTime() + span*(k+1)/(pend.length+1)));
        } else {
          pend.forEach((p,k) => p.ts = new Date(it.ts.getTime() - (pend.length-k)*60000));
        }
        pend = [];
      }
      prevA = it;
    } else pend.push(it);
  });
  if (pend.length && prevA) pend.forEach((p,k) => p.ts = new Date(prevA.ts.getTime() + (k+1)*60000));

  // Endzeitpunkt je Punkt (für "läuft gerade")
  const timed = seq.slice().sort((a,b)=> a.ts - b.ts);
  timed.forEach((it,i) => it.endTs = timed[i+1] ? timed[i+1].ts : new Date(it.ts.getTime() + 30*60000));
})();

function statusOf(it, now){
  if (it.allday){
    const d = stripTime(DAYS[it.day]).getTime(), t = stripTime(now).getTime();
    return d < t ? "done" : (d === t ? "current" : "upcoming");
  }
  if (now >= it.endTs) return "done";
  if (now >= it.ts) return "current";
  return "upcoming";
}

let filter = { type: "all", value: null };
let hidePast = false;

const groupChips  = document.getElementById("groupChips");
const personChips = document.getElementById("personChips");
const scheduleEl  = document.getElementById("schedule");
const emptyEl     = document.getElementById("empty");
const countEl     = document.getElementById("count");
const liveEl      = document.getElementById("live");

document.getElementById("hidePast").addEventListener("change", e => { hidePast = e.target.checked; render(); });

function chip(label, active, onClick, color){
  const b = document.createElement("button");
  b.className = "chip" + (active ? " active" : "") + (color ? " group" : "");
  if (color) b.innerHTML = '<span class="dot" style="background:'+color+'"></span>' + label;
  else b.textContent = label;
  b.onclick = onClick;
  return b;
}

function renderChips(){
  groupChips.innerHTML = "";
  personChips.innerHTML = "";
  groupChips.appendChild(chip("Alle", filter.type==="all", ()=>setFilter("all",null)));
  Object.entries(GROUPS).forEach(([key,g]) =>
    groupChips.appendChild(chip(g.name, filter.type==="group"&&filter.value===key, ()=>setFilter("group",key), g.color)));
  groupChips.appendChild(chip("❓ Noch offen", filter.type==="open", ()=>setFilter("open",null)));
  PEOPLE.forEach(p =>
    personChips.appendChild(chip(p.name, filter.type==="person"&&filter.value===p.name, ()=>setFilter("person",p.name), GROUPS[p.group].color)));
}

function matches(it){
  if (filter.type === "all") return true;
  if (filter.type === "open") return !!it.open;
  if (filter.type === "person") return it.who.includes(filter.value);
  if (filter.type === "group") return it.who.some(n => groupOf[n] === filter.value);
  return true;
}

function tagHtml(name){
  if (name === "?") return '<span class="tag open">offen</span>';
  const g = GROUPS[groupOf[name]];
  if (g) return '<span class="tag"><span class="dot" style="background:'+g.color+'"></span>'+name+'</span>';
  return '<span class="tag neutral">'+name+'</span>';
}

function fmt(d){ return d.getHours() + ":" + String(d.getMinutes()).padStart(2,"0"); }

function renderLive(now){
  const todayMid = stripTime(now).getTime();
  const wedMid = stripTime(DAYS.sa).getTime();
  const diff = Math.round((wedMid - todayMid) / 86400000);
  let cd;
  if (diff > 1)  cd = "Noch " + diff + " Tage bis zur Hochzeit ✶";
  else if (diff === 1) cd = "Morgen ist es so weit! ✶";
  else if (diff === 0) cd = "Heute ist der grosse Tag! 🎉";
  else if (diff === -1) cd = "Sonntag — Abbau & Ausklang.";
  else cd = "Vielen Dank an alle Helfer! ♥";

  // aktueller / nächster Punkt
  let cur = null, next = null;
  for (const it of SCHEDULE){
    const s = statusOf(it, now);
    if (s === "current" && !it.allday) cur = it;          // laufender getakteter Punkt
    if (s === "upcoming" && it.ts && !next) next = it;     // nächster getakteter Punkt
  }
  // an ruhigen Tagen: heutige Tagesaufgaben als "aktuell"
  const todayTasks = SCHEDULE.filter(it => it.allday && stripTime(DAYS[it.day]).getTime() === todayMid);

  let rows = '<div class="head"><span class="pulse"></span> Live-Status</div>';
  rows += '<p class="countdown serif">'+cd+'</p>';

  if (cur){
    rows += '<div class="nowrow"><span class="lbl">Gerade:</span><span class="val">'+
            (cur.ts ? '<span class="t">'+fmt(cur.ts)+'</span> · ' : '') + cur.title + '</span></div>';
  } else if (todayTasks.length){
    rows += '<div class="nowrow"><span class="lbl">Heute:</span><span class="val">'+
            todayTasks.map(t=>t.title).join(" · ") + '</span></div>';
  }
  if (next){
    rows += '<div class="nextrow"><span class="lbl">Als Nächstes:</span><span class="val"><span class="t">'+
            fmt(next.ts)+'</span> · '+ next.title +'</span></div>';
  }
  liveEl.innerHTML = rows;
}

function render(){
  const now = getNow();
  renderChips();
  renderLive(now);
  scheduleEl.innerHTML = "";

  let total = 0;
  SECTIONS.forEach(sec => {
    let items = SCHEDULE.filter(it => it.sec === sec.key && matches(it));
    if (hidePast) items = items.filter(it => statusOf(it, now) !== "done");
    if (!items.length) return;
    total += items.length;

    const isToday = stripTime(DAYS[SEC2DAY[sec.key]]).getTime() === stripTime(now).getTime();
    const head = document.createElement("div");
    head.className = "section-head" + (isToday ? " today" : "");
    head.innerHTML = '<h2>'+sec.title+'</h2><span class="sub">'+sec.sub+'</span>';
    scheduleEl.appendChild(head);

    items.forEach((it, i) => {
      const st = statusOf(it, now);
      const el = document.createElement("div");
      el.className = "item " + st;
      el.innerHTML =
        '<div class="time">'+ (it.time || "") +'</div>' +
        '<div class="dotcol"><span class="dot2"></span></div>' +
        '<div class="body">' +
          '<h3>'+ it.title +'</h3>' +
          (it.details ? '<p class="details">'+ it.details +'</p>' : '') +
          (it.who.length ? '<div class="who">'+ it.who.map(tagHtml).join("") +'</div>' : '') +
        '</div>';
      scheduleEl.appendChild(el);
    });
  });

  countEl.textContent = total + (total === 1 ? " Aufgabe" : " Aufgaben");
  emptyEl.style.display = total ? "none" : "block";
}

function setFilter(type, value){
  filter = { type, value };
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
// Live-Status jede Minute aktualisieren (nur Echtzeit-Modus)
if (!tParam) setInterval(render, 60000);

// einmal zum aktuell laufenden Punkt scrollen
window.addEventListener("load", () => {
  const cur = document.querySelector(".item.current");
  if (cur) setTimeout(() => cur.scrollIntoView({ behavior:"smooth", block:"center" }), 400);
});
</script>
</body>
